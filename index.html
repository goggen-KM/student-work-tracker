<style>

*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;font-size:16px}.app{max-width:980px;margin:auto;padding:12px 12px 92px}header{position:sticky;top:0;z-index:10;background:linear-gradient(var(--bg) 88%,rgba(248,245,239,0));padding:10px 0 14px}h1{font-size:20px;margin:4px 0 8px}h2{font-size:17px;margin:0 0 8px}.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:12px;margin:10px 0;box-shadow:0 1px 2px rgba(0,0,0,.04)}.bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.weekLabel{font-size:17px;font-weight:800;min-width:260px;text-align:center}.btn{border:0;border-radius:12px;background:var(--accent);color:#fff;font-weight:800;padding:11px 14px;font-size:15px}.btn.secondary{background:#6b6259}.btn.light{background:#eee4d6;color:var(--ink)}.btn.bad{background:var(--bad)}label{display:block;font-size:13px;color:var(--muted);margin-bottom:4px}input,select{width:100%;padding:10px;border:1px solid var(--line);border-radius:10px;background:white;font-size:16px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.small{font-size:12px;color:var(--muted)}.notice{background:#fff3d8;border:1px solid #e2bf73;border-radius:12px;padding:10px;margin:8px 0}.day{scroll-margin-top:110px}.dayTop{display:flex;justify-content:space-between;gap:10px;align-items:center}.dateTitle{font-size:18px;font-weight:900}.summary{font-weight:900}.ok{color:var(--ok)}.warn{color:var(--warn)}.badText{color:var(--bad)}.blue{color:var(--blue)}.work{border-top:1px dashed var(--line);padding-top:10px;margin-top:10px}.workTitle{display:flex;gap:8px;align-items:center;font-weight:800;margin-bottom:8px}.jobCard{border:1px solid var(--line);border-radius:14px;background:#fff;padding:10px;margin-top:10px}.jobCardTitle{font-size:16px;font-weight:900;margin-bottom:8px}.jobFields{display:grid;grid-template-columns:1fr 1fr;gap:10px}.jobFields .nameField{grid-column:1 / -1}.workInput{display:flex;flex-direction:column;gap:8px}.workRow{display:grid;gap:8px;align-items:end}.topRow{grid-template-columns:1fr 88px}.timeRow{grid-template-columns:1fr 1fr 130px}.confirmRow{grid-template-columns:1fr 130px}.confirmRow .btn{width:100%}.workTable{width:100%;border-collapse:collapse;background:white;font-size:13px}.workTable th{background:#ececec}.workTable th,.workTable td{border:1px solid #ccc;padding:4px;text-align:center;vertical-align:middle}.workTable input,.workTable select{padding:5px;border-radius:6px;font-size:13px}.workTable .dayCell{font-weight:900;white-space:nowrap}.workTable .hoursCell{white-space:nowrap;font-weight:800}.rowSunday{background:#fff3f3}.rowSaturday{background:#f3f8ff}.daySunday{color:#b71c1c}.daySaturday{color:#0d47a1}.timeResult{font-size:20px;font-weight:900;border:1px solid var(--line);border-radius:10px;background:#fff;padding:9px 10px;min-height:43px;text-align:center}.jobNameBox{font-size:16px;text-align:left;white-space:normal;word-break:break-word}.stateBadge{display:inline-block;border-radius:999px;padding:2px 8px;font-size:12px;font-weight:800;background:#eee4d6;color:var(--muted)}.state-none{background:#e8f5ee;color:var(--ok)}.state-work{background:#eaf0ff;color:var(--blue)}.state-blank{background:#f1eee8;color:var(--muted)}.tools{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.footer{position:fixed;bottom:0;left:0;right:0;background:#fffdfa;border-top:1px solid var(--line);padding:8px;display:flex;gap:8px;justify-content:center;z-index:20}.footer .btn{flex:1;max-width:220px}.hidden{display:none}.statusLine{margin-top:8px;color:var(--muted);font-size:12px}summary{cursor:pointer;font-weight:900;font-size:17px;list-style:none}summary::-webkit-details-marker{display:none}.summaryRow{display:flex;align-items:center;justify-content:space-between;gap:8px}.summaryRow::before{content:"▶";font-size:14px;color:var(--muted)}details[open] .summaryRow::before{content:"▼"}.collapseBody{margin-top:10px}@media(max-width:760px){.jobFields{grid-template-columns:1fr}.topRow{grid-template-columns:1fr 88px}.timeRow{grid-template-columns:1fr 1fr 118px}.confirmRow{grid-template-columns:1fr 120px}.weekLabel{min-width:100%;order:3}.bar .btn{flex:1}.workTitle{flex-wrap:wrap}.workTable{font-size:11px}.workTable th,.workTable td{padding:2px}.workTable input,.workTable select{font-size:12px;padding:3px}.workTable .timeInput{width:62px}.workTable .breakInput{width:54px}.workTable .workplaceSelect{min-width:82px}}@media print{body{background:white}.app,.footer{display:none!important}}

<body>
<div class="app">
<header>

<div class="small" id="limitStatus">日別上限CSV：読込中...</div>

</header>
<details class="card" id="studentDetails"><summary><span class="summaryRow">学生情報</span></summary><div class="collapseBody"><div class="small">学生名・学籍番号・クラスは最初に1回だけ入力します。</div><div class="grid" style="margin-top:8px"><div><label>学生名</label><input id="studentName" placeholder="例：山田 太郎"></div><div><label>学籍番号</label><input id="studentId" placeholder="例：A001"></div></div><div style="margin-top:10px"><label>クラス</label><input id="studentClass" placeholder="例：初級A"></div></div></details>
<details class="card" id="jobDetails"><summary><span class="summaryRow" id="jobSummary">アルバイト管理</span></summary><div class="collapseBody"><div class="small">アルバイト名・内容・勤務期間・締め日を登録します。必要な分だけ「＋アルバイト追加」で増やします。</div><div id="jobSettings"></div></div></details>
<details class="card" id="toolDetails"><summary><span class="summaryRow">ツール</span></summary><div class="collapseBody"><div class="tools"><button class="btn light" id="copyPrevWeek">表示中の週を先週と同じにする</button></div><hr style="border:0;border-top:1px solid var(--line);margin:12px 0"><div class="small">データ引継ぎ用：過去に出力した勤務記録Excelを読み込んで、このスマホのデータに統合します。同じ日にスマホ側の入力とExcel側の入力が異なる場合は、新しいデータであるスマホ側を優先し、その日全体はExcelで上書きしません。</div><div class="tools"><button class="btn light" id="importExcelBtn">勤務記録Excelを読み込む</button><input id="importExcelInput" type="file" accept=".xlsx,.xls" style="display:none"></div><div class="statusLine" id="importStatus">読み込み：未実行</div><hr style="border:0;border-top:1px solid var(--line);margin:12px 0"><div class="small">開発・テスト用。最終版では削除します。</div><div class="tools"><button class="btn light" id="sampleDataBtn">サンプルデータを作成</button><button class="btn bad" id="resetDataBtn">データを初期化</button></div></div></details>

<script>
const VERSION='v064';
const KEY='student-work-tracker-v047';
const OLD_KEYS=['student-work-tracker-v046','student-work-tracker-v045','student-work-tracker-v043','student-work-tracker-v042','student-work-tracker-v041','student-work-tracker-v040','student-work-tracker-v039','student-work-tracker-v038','student-work-tracker-v037','student-work-tracker-v035','student-work-tracker-v034','student-work-tracker-v033','student-work-tracker-v032','student-work-tracker-v031','student-work-tracker-v030','student-work-tracker-v029','student-work-tracker-v028','student-work-tracker-v027','student-work-tracker-v026','student-work-tracker-v025','student-work-tracker-v024','student-work-tracker-v023','student-work-tracker-v022','student-work-tracker-v021','student-work-tracker-v020','student-work-tracker-v019','student-work-tracker-v018'];
const jpWeek=['日','月','火','水','木','金','土'];
function iso(d){return new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().slice(0,10)}
function parseDate(s){const [y,m,d]=String(s).split('-').map(Number);return new Date(y,m-1,d)}
function addDays(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return x}
function weekStart(d){const x=new Date(d);x.setDate(x.getDate()-x.getDay());return iso(x)}
function weekEndFromStart(s){return iso(addDays(parseDate(s),6))}
function weekDates(start){const a=[];const d=parseDate(start);for(let i=0;i<7;i++)a.push(iso(addDays(d,i)));return a}
const initial={student:{name:'',id:'',className:''},defaultLimit:28,jobs:[],days:{},limits:{},currentWeekStart:weekStart(new Date()),lastDate:iso(new Date()),limitSource:{message:'未読込'}};
function load(){try{const cur=localStorage.getItem(KEY);if(cur)return JSON.parse(cur);for(const k of OLD_KEYS){const v=localStorage.getItem(k);if(v)return JSON.parse(v)}return null}catch(e){return null}}
let state=load()||JSON.parse(JSON.stringify(initial));
if(!state.jobs)state.jobs=[];state.jobs.forEach(j=>{if(j.startDate===undefined)j.startDate='';if(j.endDate===undefined)j.endDate='';if(j.content===undefined)j.content='';if(j.closeDay===undefined)j.closeDay=''});if(state.jobs.length===1&&!hasAnyJobData(state.jobs[0]))state.jobs=[];if(!state.currentWeekStart)state.currentWeekStart=weekStart(new Date());if(!state.student)state.student={name:'',id:'',className:''};if(!state.days)state.days={};if(!state.limits)state.limits={};
function save(){localStorage.setItem(KEY,JSON.stringify(state))}
function esc(s){return String(s??'').replace(/[&<>\"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[c]||c))}
function normalizeDate(s){
  s=String(s||'').trim().replace(/^"|"$/g,'');
  s=s.replace(/[.\/]/g,'-');
  let m=s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
  if(!m)return '';
  return `${m[1]}-${String(Number(m[2])).padStart(2,'0')}-${String(Number(m[3])).padStart(2,'0')}`;
}
function hasJob(j){return !!(j&&String(j.name||'').trim())}
function hasAnyJobData(j){return !!(j&&(String(j.name||'').trim()||String(j.content||'').trim()||String(j.startDate||'').trim()||String(j.endDate||'').trim()||String(j.closeDay||'').trim()||j._editing))}
function isJobActive(k,ds){const j=state.jobs[k]||{};if(!hasJob(j))return false;const st=j.startDate||'',en=j.endDate||'';return(!st||st<=ds)&&(!en||en>=ds)}
function jobLabel(k){const j=state.jobs[k]||{};return(j.name&&j.name.trim())?j.name.trim():('アルバイト'+(Number(k)+1))}
function activeJobIndexes(ds){const out=[];for(let k=0;k<state.jobs.length;k++)if(isJobActive(k,ds))out.push(k);return out}
function normalizeWork(w){if(!w)w={};if(!w.status)w.status=w.on?'work':'blank';if(w.breakMin===undefined)w.breakMin=0;if(w.jobIndex===undefined||w.jobIndex===null||w.jobIndex==='')w.jobIndex=null;else if(w.jobIndex==='__none'||w.jobIndex==='none'||w.jobName==='なし'){w.jobIndex=null;w.status='none'}else{const n=Number(w.jobIndex);if(Number.isFinite(n))w.jobIndex=n;else{w.jobIndex=null;if(w.status==='work')w.status='blank'}}if(w.status==='none'){w.jobIndex=null;w.start='';w.end='';w.breakMin=0;w.hours=0}if(w.hours===undefined)w.hours=(w.status==='work'?calcHours(w.start,w.end,w.breakMin):null);if(!['work','none','blank'].includes(w.status))w.status='blank';return w}
function ensureDay(ds){if(!state.days[ds])state.days[ds]={works:[]};if(!Array.isArray(state.days[ds].works))state.days[ds].works=[];state.days[ds].works.forEach((w,i)=>{normalizeWork(w);if(w.jobIndex===null&&w.status==='work')w.jobIndex=i<20?i:null;if(w.jobName&&w.jobIndex!==null&&!state.jobs[w.jobIndex]?.name)state.jobs[w.jobIndex].name=w.jobName});return state.days[ds]}
function getWorkForJob(ds,jobIdx){const day=ensureDay(ds);let w=day.works.find(x=>Number(x.jobIndex)===Number(jobIdx));if(!w){w={status:'blank',jobIndex:Number(jobIdx),start:'',end:'',breakMin:0,hours:null};day.works.push(w)}return normalizeWork(w)}
function calcHours(start,end,breakMin=0){if(!start||!end)return null;const[sh,sm]=start.split(':').map(Number),[eh,em]=end.split(':').map(Number);let a=sh*60+sm,b=eh*60+em;if(b<a)b+=24*60;return Math.max(0,(b-a-(Number(breakMin)||0))/60)}
function dayHours(ds){return ensureDay(ds).works.reduce((sum,w)=>{normalizeWork(w);return sum+(w.status==='work'&&typeof w.hours==='number'?w.hours:0)},0)}
function sevenHours(ds){let d=parseDate(ds),sum=0;for(let i=6;i>=0;i--)sum+=dayHours(iso(addDays(d,-i)));return sum}
function limit(ds){return Number(state.limits[ds]??state.defaultLimit??28)}
function statusClass(sum,lim){if(sum>lim)return'badText';if(sum>=lim*0.9)return'warn';return'ok'}
function judge(sum,lim){return sum>lim?'超過':(sum>=lim*0.9?'注意':'OK')}
function badge(status){if(status==='work')return'<span class="stateBadge state-work">あり</span>';if(status==='none')return'<span class="stateBadge state-none">なし</span>';return'<span class="stateBadge state-blank">未入力</span>'}
function displayHours(w){return(w.status==='work'&&typeof w.hours==='number')?w.hours.toFixed(1):''}
function setLimitStatus(msg){const el=document.getElementById('limitStatus');if(el)el.textContent='日別上限CSV：'+msg;state.limitSource=state.limitSource||{};state.limitSource.message=msg}
function parseLimitCsv(text){
  const lines=text.replace(/^\uFEFF/,'').split(/\r?\n/).map(x=>x.trim()).filter(Boolean);
  state.limits={};
  if(!lines.length)return 0;
  let start=0;
  const head=lines[0].split(',').map(x=>x.trim().replace(/^"|"$/g,'').toLowerCase());
  const hasHeader=(head.includes('date')&&head.includes('limit'))||(head.includes('日付')&&head.includes('上限'));
  if(hasHeader)start=1;
  let count=0;
  for(let idx=start;idx<lines.length;idx++){
    const cols=lines[idx].split(',').map(x=>x.trim().replace(/^"|"$/g,''));
    const date=normalizeDate(cols[0]),val=Number(cols[1]);
    if(date&&!Number.isNaN(val)&&val>0){state.limits[date]=val;count++}
  }
  return count;
}
async function loadLimitsCsv(){
  try{
    const res=await fetch('limits.csv?ts='+Date.now(),{cache:'no-store'});
    if(!res.ok)throw new Error('limits.csv が見つかりません');
    const count=parseLimitCsv(await res.text());
    save();
    const sampleDates=Object.keys(state.limits||{}).sort();
    const sample=sampleDates.length ? ` / 例 ${sampleDates[0]}=${state.limits[sampleDates[0]]}h` : '';
    setLimitStatus(count+'件を読み込みました'+sample);
    renderDays();
  }catch(err){
    setLimitStatus('未読込（'+err.message+'）');
  }
}
function updateStateFromInputs(){state.student.name=document.getElementById('studentName').value;state.student.id=document.getElementById('studentId').value;state.student.className=document.getElementById('studentClass').value;document.querySelectorAll('[data-job-name]').forEach(el=>state.jobs[Number(el.dataset.jobName)].name=el.value);document.querySelectorAll('[data-job-content]').forEach(el=>state.jobs[Number(el.dataset.jobContent)].content=el.value);document.querySelectorAll('[data-job-start]').forEach(el=>state.jobs[Number(el.dataset.jobStart)].startDate=el.value);document.querySelectorAll('[data-job-end]').forEach(el=>state.jobs[Number(el.dataset.jobEnd)].endDate=el.value);document.querySelectorAll('[data-job-close]').forEach(el=>state.jobs[Number(el.dataset.jobClose)].closeDay=el.value)}
function render(){document.getElementById('studentName').value=state.student.name||'';document.getElementById('studentId').value=state.student.id||'';document.getElementById('studentClass').value=state.student.className||'';setLimitStatus((state.limitSource&&state.limitSource.message)||'未読込');renderJobs();renderWeekLabel();renderDays()}
function updateJobSummary(){const registered=state.jobs.filter(j=>hasJob(j)).length;const js=document.getElementById('jobSummary');if(js)js.textContent='アルバイト管理（登録済み '+registered+'件）'}
function renderJobs(){const box=document.getElementById('jobSettings');if(!box)return;updateJobSummary();box.innerHTML='';state.jobs.forEach((j,i)=>{j=j||{name:'',content:'',startDate:'',endDate:'',closeDay:''};if(!hasAnyJobData(j))return;const div=document.createElement('div');div.className='jobCard';const title=(j.name&&j.name.trim())?j.name.trim():('アルバイト'+(i+1));div.innerHTML=`<div class="jobCardTitle">${esc(title)}</div><div class="jobFields"><div class="nameField"><label>アルバイト名</label><input data-job-name="${i}" value="${esc(j.name||'')}" placeholder="例：アルバイト${i+1}"></div><div class="nameField"><label>アルバイト内容</label><input data-job-content="${i}" value="${esc(j.content||'')}" placeholder="例：コンビニ店員、ホール、工場作業"></div><div><label>勤務開始日</label><input data-job-start="${i}" type="date" value="${esc(j.startDate||'')}"></div><div><label>勤務終了日</label><input data-job-end="${i}" type="date" value="${esc(j.endDate||'')}"><div class="small">空欄なら現在も勤務中</div></div><div><label>締め日（必須）</label><input data-job-close="${i}" type="number" min="1" max="31" step="1" value="${esc(j.closeDay||'')}" placeholder="例：15"><div class="small">1〜31。31は月末扱い</div></div></div>`;box.appendChild(div)});const add=document.createElement('div');add.className='tools';add.innerHTML='<button class="btn light" type="button" id="addJobMasterBtn" onclick="addJobMaster()">＋ アルバイト追加</button>';box.appendChild(add)}
function addJobMaster(){state.jobs.push({name:'',content:'',startDate:'',endDate:'',closeDay:'',_editing:true});save();renderJobs();renderDays();}
function deleteJobMaster(index){if(!confirm('このアルバイト登録を削除します。過去の勤務記録は削除されません。'))return;state.jobs.splice(index,1);if(state.jobs.length===0)state.jobs.push({name:'',content:'',startDate:'',endDate:'',closeDay:''});save();renderJobs();renderDays();}
function renderWeekLabel(){const a=state.currentWeekStart,b=weekEndFromStart(a),ad=parseDate(a),bd=parseDate(b);document.getElementById('weekLabel').textContent=`${ad.getFullYear()}/${ad.getMonth()+1}/${ad.getDate()}(${jpWeek[ad.getDay()]})〜${bd.getFullYear()}/${bd.getMonth()+1}/${bd.getDate()}(${jpWeek[bd.getDay()]})`}
function visibleWorks(ds){const day=ensureDay(ds);const arr=[];day.works.forEach((w,i)=>{normalizeWork(w);const hasInput=nonEmpty(w.start)||nonEmpty(w.end)||Number(w.breakMin||0)>0||(w.jobIndex!==null&&w.jobIndex!==undefined)||w._manual;if(w.status==='work'||w.status==='none'||hasInput)arr.push({index:i,work:w,readOnly:(w.status==='work'&&w.jobIndex!==null&&!isJobActive(Number(w.jobIndex),ds))})});return arr;}
function activeJobOptions(ds,selected,status){let html='<option value="">選択</option>';html+=`<option value="__none" ${status==='none'?'selected':''}>なし</option>`;const hasSelected=selected!==null&&selected!==undefined&&selected!=='';const ids=new Set(activeJobIndexes(ds));Array.from(ids).sort((a,b)=>a-b).forEach(ji=>{html+=`<option value="${ji}" ${status!=='none'&&hasSelected&&Number(selected)===ji?'selected':''}>${esc(jobLabel(ji))}</option>`});return html;}
function emptyWork(){return {status:'blank',jobIndex:null,start:'',end:'',breakMin:0,hours:null,_manual:false};}
function addWorkRow(ds){const day=ensureDay(ds);const w=emptyWork();w._manual=true;day.works.push(w);save();renderDays();}
function deleteWorkRow(ds,idx){const day=ensureDay(ds);if(idx>=0&&idx<day.works.length)day.works.splice(idx,1);save();renderDays();}

utton></td></tr>`;}
function renderDays(){const box=document.getElementById('days');box.innerHTML='';const card=document.createElement('section');card.className='card day';let html='<table class="workTable"><thead><tr><th>日付</th><th>勤務先</th><th>出勤</th><th>退勤</th><th>休憩</th><th>時間</th><th>7日計</th><th>追加</th><th>削除</th></tr></thead><tbody>';weekDates(state.currentWeekStart).forEach(ds=>{let items=visibleWorks(ds);if(items.length===0){const day=ensureDay(ds);let bi=day.works.findIndex(w=>{normalizeWork(w);return w.status!=='work'&&!nonEmpty(w.start)&&!nonEmpty(w.end)&&Number(w.breakMin||0)===0&&(w.jobIndex===null||w.jobIndex===undefined)});if(bi<0){day.works.push(emptyWork());bi=day.works.length-1}items=[{index:bi,work:day.works[bi],readOnly:false}];}items.forEach((it,i)=>html+=workRowHtml(ds,it,i,i===0));});html+='</tbody></table>';card.innerHTML=html;box.appendChild(card)}

function rows(a,b){const out=[];for(let d=parseDate(a);iso(d)<=b;d=addDays(d,1)){const ds=iso(d);ensureDay(ds).works.forEach((w)=>{normalizeWork(w);const s7=sevenHours(ds),lim=limit(ds);if(w.status==='none'){out.push({date:ds,week:jpWeek[d.getDay()],jobNo:'',name:'なし',content:'',status:'none',statusJa:'なし',start:'',end:'',breakMin:0,hours:0,sum7:s7,limit:lim,judge:judge(s7,lim)});return;}if(w.status!=='work'||w.jobIndex===null||w.jobIndex===undefined)return;const ji=Number(w.jobIndex),h=typeof w.hours==='number'?w.hours:0;out.push({date:ds,week:jpWeek[d.getDay()],jobNo:ji+1,name:jobLabel(ji),content:(state.jobs[ji]&&state.jobs[ji].content)||'',status:'work',statusJa:'あり',start:w.start||'',end:w.end||'',breakMin:w.breakMin??0,hours:h,sum7:s7,limit:lim,judge:judge(s7,lim)})})}return out}
function rowsForExcel(a,b){const out=[];for(let d=parseDate(a);iso(d)<=b;d=addDays(d,1)){const ds=iso(d);const dayRows=[];ensureDay(ds).works.forEach((w)=>{normalizeWork(w);const s7=sevenHours(ds),lim=limit(ds);if(w.status==='none'){dayRows.push({date:ds,week:jpWeek[d.getDay()],jobNo:'',name:'なし',content:'',status:'none',statusJa:'なし',start:'',end:'',breakMin:0,hours:0,sum7:s7,limit:lim,judge:judge(s7,lim)});return;}if(w.status!=='work'||w.jobIndex===null||w.jobIndex===undefined)return;const ji=Number(w.jobIndex),h=typeof w.hours==='number'?w.hours:0;dayRows.push({date:ds,week:jpWeek[d.getDay()],jobNo:ji+1,name:jobLabel(ji),content:(state.jobs[ji]&&state.jobs[ji].content)||'',status:'work',statusJa:'あり',start:w.start||'',end:w.end||'',breakMin:w.breakMin??0,hours:h,sum7:s7,limit:lim,judge:judge(s7,lim)})});if(dayRows.length===0){const s7=sevenHours(ds),lim=limit(ds);dayRows.push({date:ds,week:jpWeek[d.getDay()],jobNo:'',name:'',content:'',status:'blank',statusJa:'未入力',start:'',end:'',breakMin:'',hours:'',sum7:s7,limit:lim,judge:judge(s7,lim)})}out.push(...dayRows)}return out}

function allDataRange(){

function fileNameBase(a,b){return 'arbeit_'+VERSION+'_'+(state.student.id||'noid')+'_'+a+'_'+b}
function applyJapaneseExcelStyle(ws){
  // iPad / Numbers / Excel で日本語が文字化け・豆腐表示になりにくいよう、
  // すべてのセルに日本語フォント候補を明示する。
  Object.keys(ws).forEach(addr=>{
    if(addr[0]==='!')return;
    const cell=ws[addr];
    if(!cell)return;
    cell.s=cell.s||{};
    const oldFont=cell.s.font||{};
    cell.s.font={...oldFont,name:'Hiragino Sans',sz:oldFont.sz||11};
    if(!cell.s.alignment)cell.s.alignment={vertical:'center'};
  });
}
function buildWorkbook(a,b){
  if(!window.XLSX)throw new Error('Excel作成ライブラリを読み込めませんでした。');
  const wb=XLSX.utils.book_new();

  // 学生情報シート：入管変換ツールが読むためのメタ情報
  const meta=[['項目','値'],['氏名',state.student.name||''],['学籍番号',state.student.id||''],['クラス',state.student.className||''],['作成バージョン',VERSION],['出力開始日',a],['出力終了日',b],['作成日時',new Date().toLocaleString('ja-JP')]];
  const metaWs=XLSX.utils.aoa_to_sheet(meta);
  metaWs['!cols']=[{wch:18},{wch:28}];
  applyJapaneseExcelStyle(metaWs);
  XLSX.utils.book_append_sheet(wb,metaWs,'学生情報');

  // アルバイト情報シート：アルバイト内容・期間を保持
  const jobData=[['アルバイト番号','アルバイト名','アルバイト内容','勤務開始日','勤務終了日','締め日']];
  state.jobs.forEach((j,i)=>{if(hasAnyJobData(j))jobData.push([i+1,j.name||'',j.content||'',j.startDate||'',j.endDate||'',j.closeDay||''])});
  const jobWs=XLSX.utils.aoa_to_sheet(jobData);
  jobWs['!cols']=[{wch:14},{wch:22},{wch:28},{wch:14},{wch:14},{wch:10}];
  applyJapaneseExcelStyle(jobWs);
  XLSX.utils.book_append_sheet(wb,jobWs,'アルバイト情報');

  // 勤務記録シート
  const data=[['日付','曜日','アルバイト番号','アルバイト名','アルバイト内容','状態','開始','終了','休み時間分','労働時間','直近7日間合計','上限','判定']];
  rowsForExcel(a,b).forEach(r=>data.push([r.date,r.week,r.jobNo,r.name,r.content||'',r.statusJa,r.start,r.end,r.breakMin,r.status==='work'?Number(r.hours.toFixed(1)):(r.status==='none'?0:''),Number(r.sum7.toFixed(1)),r.limit,r.judge]));
  const ws=XLSX.utils.aoa_to_sheet(data);
  ws['!cols']=[{wch:12},{wch:5},{wch:12},{wch:20},{wch:24},{wch:8},{wch:8},{wch:8},{wch:12},{wch:10},{wch:14},{wch:8},{wch:8}];
  const headerStyle={font:{bold:true,color:{rgb:'FFFFFF'}},fill:{fgColor:{rgb:'6B6259'}},alignment:{horizontal:'center'}};
  for(let c=0;c<data[0].length;c++){const cell=ws[XLSX.utils.encode_cell({r:0,c})];if(cell)cell.s=headerStyle}
  for(let r=1;r<data.length;r++){const j=data[r][12],fill=j==='超過'?'FFC7CE':(j==='注意'?'FFEB9C':'FFFFFF');for(let c=0;c<data[0].length;c++){const cell=ws[XLSX.utils.encode_cell({r,c})];if(cell)cell.s={fill:{fgColor:{rgb:fill}},border:{top:{style:'thin',color:{rgb:'DDDDDD'}},bottom:{style:'thin',color:{rgb:'DDDDDD'}},left:{style:'thin',color:{rgb:'DDDDDD'}},right:{style:'thin',color:{rgb:'DDDDDD'}}}}}}
  applyJapaneseExcelStyle(ws);
  XLSX.utils.book_append_sheet(wb,ws,'勤務記録');
  return wb
}

function shareMessage(kind){
  const name=String(state.student&&state.student.name||'').trim();
  if(kind==='pdf')return (name?name+' ':'')+'アルバイト記録PDF';
  return (name?name+' ':'')+'アルバイト記録';
}
async function shareBlob(blob,filename,title){
  const file=new File([blob],filename,{type:blob.type});
  try{
    const shareData={files:[file],title:' ',text:shareMessage('excel')};
    if(navigator.canShare && navigator.canShare(shareData)){
      await navigator.share(shareData);
      alert('共有画面を開きました。LINE・ファイル保存などを選んでください。');
      return true;
    }
  }catch(e){
    console.warn('share failed',e);
  }
  try{
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    a.download=filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),1500);
    alert('共有機能が使えないため、ダウンロードを試みました。保存先を確認してください。');
    return false;
  }catch(e){
    alert('共有・保存に失敗しました：'+e.message);
    throw e;
  }
}

async function shareBlobOrOpen(blob,filename,title,label){
  const file=new File([blob],filename,{type:blob.type});
  try{
    const shareData={files:[file],title:' ',text:shareMessage('pdf')};
    if(navigator.canShare && navigator.canShare(shareData)){
      await navigator.share(shareData);

function validateJobCloseDays(){
  const missing=[];
  state.jobs.forEach((j,i)=>{
    if(hasJob(j)){
      const v=String(j.closeDay||'').trim();
      const n=Number(v);
      if(!v || !Number.isFinite(n) || n<1 || n>31) missing.push('アルバイト'+(i+1)+'（'+jobLabel(i)+'）');
    }
  });
  if(missing.length){
    alert('締め日を入力してください。\n\n'+missing.join('\n')+'\n\n※1〜31の数字で入力してください。31は月末扱いです。');
    return false;
  }
  return true;
}

function formatJpDate(ds){
  const d=parseDate(ds);

}
function safeFilePart(s){return String(s||'').replace(/[\\/:*?"<>|\s]+/g,'_').slice(0,40)||'noid'}
function buildPdfWeekPageHtml(start,end,pageNo,totalPages){
  const rs=rows(start,end);
  const byDate={};
  weekDates(start).forEach(ds=>byDate[ds]=[]);
  rs.forEach(r=>{if(byDate[r.date])byDate[r.date].push(r)});
  const created=new Date().toLocaleString('ja-JP');
  let html=`<div class="pdfPage">
    <div class="pdfHeader">
      <div><b>アルバイト時間記録</b></div>
      <div>氏名：${esc(state.student.name||'')}</div>
      <div>学籍番号：${esc(state.student.id||'')}</div>
      <div>対象週：${formatJpDate(start)} ～ ${formatJpDate(end)}</div>
      <div>出力日時：${esc(created)}</div>
    </div>
    <table class="pdfTable"><thead><tr><th>日付</th><th>アルバイト名</th><th>状態</th><th>開始</th><th>終了</th><th>休み</th><th>時間</th><th>7日間</th><th>上限</th><th>判定</th></tr></thead><tbody>`;
  Object.keys(byDate).forEach(ds=>{
    const d=parseDate(ds);
    const items=byDate[ds];
    if(!items.length){
      html+=`<tr><td>${d.getMonth()+1}/${d.getDate()}（${jpWeek[d.getDay()]}）</td><td colspan="9" class="pdfMuted">記録なし</td></tr>`;
    }else{
      items.forEach((r,idx)=>{
        const cls=r.judge==='超過'?'pdfBad':(r.judge==='注意'?'pdfWarn':'');
        html+=`<tr class="${cls}"><td>${idx===0?`${d.getMonth()+1}/${d.getDate()}（${jpWeek[d.getDay()]}）`:''}</td><td>${esc(r.name)}</td><td>${esc(r.statusJa)}</td><td>${esc(r.start)}</td><td>${esc(r.end)}</td><td>${r.breakMin??''}</td><td>${r.status==='work'?r.hours.toFixed(1):(r.status==='none'?'0':'')}</td><td>${r.sum7.toFixed(1)}</td><td>${r.limit}</td><td>${esc(r.judge)}</td></tr>`;
      });
    }
  });
  html+=`</tbody></table><div class="pdfFooter">${pageNo} / ${totalPages}</div></div>`;
  return html;
}
async function sharePdf(){
  try{
    updateStateFromInputs();
    if(!validateJobCloseDays())return;
    save();
    if(!window.jspdf||!window.jspdf.jsPDF)throw new Error('PDF作成ライブラリを読み込めませんでした。');

    const host=document.createElement('div');
    host.style.position='fixed';host.style.left='-10000px';host.style.top='0';host.style.width='1120px';host.style.background='#ffffff';host.style.zIndex='-1';

      .pdfPage{width:1120px;min-height:794px;background:#fff;color:#222;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;padding:28px;box-sizing:border-box;}

      .pdfBad td{background:#ffc7ce}.pdfWarn td{background:#ffeb9c}.pdfMuted{color:#777;background:#f7f7f7}.pdfFooter{text-align:center;margin-top:18px;font-size:16px;color:#555;}

    const filename=`${safeFilePart(state.student.id)}_${safeFilePart(state.student.name)}_勤務記録_${a}_${b}.pdf`;
    const blob=doc.output('blob');
    await shareBlobOrOpen(blob,filename,undefined,'PDF');
  }catch(e){alert('PDF作成に失敗しました：'+e.message)}

function excelDateToIso(v){
  if(v instanceof Date && !isNaN(v))return iso(v);
  if(typeof v==='number' && window.XLSX && XLSX.SSF){const d=XLSX.SSF.parse_date_code(v);if(d)return `${d.y}-${String(d.m).padStart(2,'0')}-${String(d.d).padStart(2,'0')}`}
  const t=String(v??'').trim();
  if(!t)return '';
  const n=normalizeDate(t); if(n)return n;
  const m=t.match(/^(\d{4})[\/.\-](\d{1,2})[\/.\-](\d{1,2})/); if(m)return `${m[1]}-${String(Number(m[2])).padStart(2,'0')}-${String(Number(m[3])).padStart(2,'0')}`;
  return '';
}
function sheetRows(wb,name){const ws=wb.Sheets[name];return ws?XLSX.utils.sheet_to_json(ws,{header:1,defval:'',raw:false}):[]}
function findHeaderRow(rows,need){
  for(let r=0;r<Math.min(rows.length,20);r++){
    const vals=rows[r].map(x=>String(x).trim());
    if(need.every(n=>vals.includes(n)))return r;
  }
  return -1;
}
function colMap(row){const m={};row.forEach((v,i)=>{const k=String(v).trim();if(k)m[k]=i});return m}
function nonEmpty(v){return String(v??'').trim()!==''}
function findOrCreateJobByName(name){
  name=String(name||'').trim();
  if(!name)return null;
  for(let i=0;i<state.jobs.length;i++)if(String(state.jobs[i]?.name||'').trim()===name)return i;
  for(let i=0;i<state.jobs.length;i++)if(!hasJob(state.jobs[i])){state.jobs[i].name=name;return i;}
  state.jobs.push({name:name,content:'',startDate:'',endDate:'',closeDay:''});
  return state.jobs.length-1;
}
function mergeImportedJob(idx,info,counter){
  if(idx===null||idx===undefined||idx<0)return;
  const j=state.jobs[idx]||(state.jobs[idx]={name:'',content:'',startDate:'',endDate:'',closeDay:''});
  ['name','content','startDate','endDate','closeDay'].forEach(k=>{if(nonEmpty(info[k]) && !nonEmpty(j[k])){j[k]=info[k];counter.jobs++}});
}
function parseImportedStatus(v){
  const s=String(v??'').trim();
  if(!s||s==='未入力')return 'blank';
  if(s==='あり'||s==='勤務'||s==='work')return 'work';
  if(s==='なし'||s==='none')return 'none';
  return 'blank';
}
function importedDayKeyItem(item){
  if(!item)return null;
  if(item.status==='none')return 'none';
  if(item.status==='work'){
    return ['work',String(item.jobIndex??''),String(item.start||''),String(item.end||''),String(Number(item.breakMin||0)),String(Number(item.hours||0).toFixed(2))].join('|');
  }
  return null;
}
function currentDayKeyItems(ds){
  const day=ensureDay(ds);
  const out=[];
  day.works.forEach(w=>{
    normalizeWork(w);
    if(w.status==='none')out.push(importedDayKeyItem({status:'none'}));
    if(w.status==='work'&&w.jobIndex!==null&&w.jobIndex!==undefined){
      out.push(importedDayKeyItem({status:'work',jobIndex:Number(w.jobIndex),start:w.start||'',end:w.end||'',breakMin:Number(w.breakMin||0),hours:Number(w.hours||0)}));
    }
  });
  return out.filter(Boolean).sort();
}
function importedDayKeyItems(items){
  return items.map(importedDayKeyItem).filter(Boolean).sort();
}
function keyItemsEqual(a,b){
  if(a.length!==b.length)return false;
  for(let i=0;i<a.length;i++)if(a[i]!==b[i])return false;
  return true;
}
function hasEnteredDay(ds){return currentDayKeyItems(ds).length>0;}
function formatImportDiffDates(dates){
  return dates.slice(0,20).map(ds=>{
    const d=parseDate(ds);
    return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}（${jpWeek[d.getDay()]}）`;
  }).join('、')+(dates.length>20?` ほか${dates.length-20}日`:'' );
}
async function importExcelFile(file){
  const status=document.getElementById('importStatus');
  try{
    if(!file)return;
    if(!window.XLSX)throw new Error('Excel読み込みライブラリを読み込めませんでした。');
    status.textContent='読み込み中...';
    const buf=await file.arrayBuffer();
    const wb=XLSX.read(buf,{type:'array',cellDates:true});
    const counter={student:0,jobs:0,daysImported:0,unchangedDays:0,skippedBlank:0,diffDays:0,rowsRead:0};

    // 学生情報
    const meta=sheetRows(wb,'学生情報');
    if(meta.length){
      meta.forEach(row=>{const key=String(row[0]??'').trim(), val=String(row[1]??'').trim();
        if(!val)return;
        if(key==='氏名' && !state.student.name){state.student.name=val;counter.student++}
        if(key==='学籍番号' && !state.student.id){state.student.id=val;counter.student++}
        if(key==='クラス' && !state.student.className){state.student.className=val;counter.student++}
      });
    }

    // アルバイト情報
    const jobRows=sheetRows(wb,'アルバイト情報');
    const jh=findHeaderRow(jobRows,['アルバイト番号','アルバイト名']);
    if(jh>=0){
      const cm=colMap(jobRows[jh]);
      for(let r=jh+1;r<jobRows.length;r++){
        const row=jobRows[r];
        const no=Number(row[cm['アルバイト番号']]);
        const idx=Number.isFinite(no)&&no>0?no-1:findOrCreateJobByName(row[cm['アルバイト名']]);
        mergeImportedJob(idx,{name:row[cm['アルバイト名']]||'',content:row[cm['アルバイト内容']]||'',startDate:excelDateToIso(row[cm['勤務開始日']]),endDate:excelDateToIso(row[cm['勤務終了日']]),closeDay:row[cm['締め日']]||''},counter);
      }
    }

    // 勤務記録：いったんExcel側を日付ごとにまとめる。
    let rows2=sheetRows(wb,'勤務記録');
    let wh=findHeaderRow(rows2,['日付','アルバイト名','労働時間']);
    if(wh<0){
      for(const name of wb.SheetNames){
        const cand=sheetRows(wb,name); const h=findHeaderRow(cand,['日付','アルバイト名','労働時間']);
        if(h>=0){rows2=cand; wh=h; break;}
      }
    }
    if(wh<0)throw new Error('勤務記録Excelの見出し行を認識できません。日付・アルバイト名・労働時間の列が必要です。');
    const cm=colMap(rows2[wh]);
    const importedByDate=new Map();
    for(let r=wh+1;r<rows2.length;r++){
      const row=rows2[r];
      const ds=excelDateToIso(row[cm['日付']]);
      if(!ds)continue;
      const st=parseImportedStatus(row[cm['状態']]);
      if(st==='blank'){counter.skippedBlank++;continue;} // 未入力は入力済みデータとして扱わない
      if(!importedByDate.has(ds))importedByDate.set(ds,[]);
      counter.rowsRead++;
      if(st==='none'){
        importedByDate.get(ds).push({status:'none',jobIndex:null,start:'',end:'',breakMin:0,hours:0});
        continue;
      }
      if(st==='work'){
        let jobIdx=null;
        if(cm['アルバイト番号']!==undefined){const no=Number(row[cm['アルバイト番号']]); if(Number.isFinite(no)&&no>0)jobIdx=no-1;}
        if(jobIdx===null||jobIdx<0||jobIdx>=20)jobIdx=findOrCreateJobByName(row[cm['アルバイト名']]);
        if(jobIdx===null||jobIdx===undefined)continue;
        mergeImportedJob(jobIdx,{name:row[cm['アルバイト名']]||'',content:row[cm['アルバイト内容']]||'',startDate:'',endDate:''},counter);
        const start=String(row[cm['開始']]??'').trim();
        const end=String(row[cm['終了']]??'').trim();
        const breakMin=Number(row[cm['休み時間分']]??row[cm['休み時間']]??0)||0;
        let h=Number(row[cm['労働時間']]);
        if(!Number.isFinite(h))h=calcHours(start,end,breakMin);
        const newHours=Number.isFinite(h)?h:calcHours(start,end,breakMin);
        importedByDate.get(ds).push({status:'work',jobIndex:jobIdx,start:start,end:end,breakMin:breakMin,hours:newHours});
      }
    }

    // 日付単位で統合する。
    // スマホ側に入力済みデータがない日だけ、Excel側の日付データを丸ごと復元する。
    // スマホ側とExcel側の入力済みデータが異なる日は、スマホ側を新しいデータとして優先し、日付を表示する。
    const diffDates=[];
    const importedDates=[...importedByDate.keys()].sort();
    for(const ds of importedDates){
      const importedItems=importedByDate.get(ds).filter(Boolean);
      const importedKeys=importedDayKeyItems(importedItems);
      if(!importedKeys.length)continue;
      const currentKeys=currentDayKeyItems(ds);
      if(!currentKeys.length){
        state.days[ds]={works:importedItems.map(x=>({...x}))};
        counter.daysImported++;
        continue;
      }
      if(keyItemsEqual(currentKeys,importedKeys)){
        counter.unchangedDays++;
      }else{
        counter.diffDays++;
        diffDates.push(ds);
        // スマホ側が新しいデータなので、Excel側ではその日を部分追加・部分上書きしない。
      }
    }

    save();render();
    let msg=`読み込み完了：復元 ${counter.daysImported}日、同一 ${counter.unchangedDays}日、未入力スキップ ${counter.skippedBlank}行、相違 ${counter.diffDays}日`;
    if(diffDates.length){
      msg+=`\n\nスマホ側とExcel側で入力済みデータが異なる日：\n${formatImportDiffDates(diffDates)}\n\nこれらの日は、スマホ側の新しいデータを優先しました。`;
    }
    status.textContent=msg;
    alert(msg);
  }catch(e){
    console.error(e);
    status.textContent='読み込み失敗：'+e.message;
    alert(status.textContent);
  }finally{
    const input=document.getElementById('importExcelInput'); if(input)input.value='';
  }
}

function createSampleData(){
if(!confirm('現在の入力データをランダムなサンプルデータで上書きします。よろしいですか？'))return;
state=JSON.parse(JSON.stringify(initial));
const rnd=(min,max)=>Math.floor(Math.random()*(max-min+1))+min;
const pick=a=>a[rnd(0,a.length-1)];
function fmtTime(min){const h=Math.floor(min/60),m=min%60;return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')}
function minutesOf(start,end,breakMin){return Math.round((calcHours(start,end,breakMin)||0)*60)}
function overlaps(a,b){return Math.max(a.start,b.start)<Math.min(a.end,b.end)}
function hasOverlap(list,cand){return list.some(x=>overlaps(x,cand))}
function addSampleShift(ds,jobIndex,startMin,durMin,breakMin){
  const day=ensureDay(ds);
  const cand={start:startMin,end:startMin+durMin};
  const existing=day.works.filter(w=>w.status==='work').map(w=>{
    const [sh,sm]=String(w.start||'0:0').split(':').map(Number);
    const [eh,em]=String(w.end||'0:0').split(':').map(Number);
    let a=sh*60+sm,b=eh*60+em;if(b<a)b+=1440;return {start:a,end:b};
  });
  if(hasOverlap(existing,cand))return false;
  const w=getWorkForJob(ds,jobIndex);
  w.status='work';w.jobIndex=jobIndex;w.start=fmtTime(startMin%1440);w.end=fmtTime((startMin+durMin)%1440);w.breakMin=breakMin;w.hours=calcHours(w.start,w.end,breakMin);
  return true;
}
function sevenTotalMinutes(ds){
  const d=parseDate(ds);let total=0;
  for(let i=6;i>=0;i--){
    const key=iso(addDays(d,-i));
    ensureDay(key).works.forEach(w=>{if(w.status==='work')total+=minutesOf(w.start,w.end,w.breakMin||0)});
  }
  return total;
}
function addWithinLimit(ds,jobIndex,startMin,durMin,breakMin,limitMin){
  const before=JSON.stringify(state.days[ds]||{works:[]});
  if(!addSampleShift(ds,jobIndex,startMin,durMin,breakMin))return false;
  if(sevenTotalMinutes(ds)>limitMin){state.days[ds]=JSON.parse(before);return false;}
  return true;
}
function activeForDate(ds){return activeJobIndexes(ds)}
state.currentWeekStart=weekStart(parseDate('2026-06-14'));
state.lastDate='2026-06-20';
state.student={name:'テスト 太郎'+rnd(1,99),id:'SAMPLE'+String(rnd(1,999)).padStart(3,'0'),className:'初級A'};
const candidates=[
  ['セブンイレブン','コンビニ店員','15'],['ローソン','レジ・品出し','20'],['ファミリーマート','コンビニ店員','25'],['工場','食品製造補助','31'],['カフェ','ホール・接客','10'],['清掃会社','清掃補助','5'],['居酒屋','ホール','15'],['スーパー','品出し','20'],['ホテル','ベッドメイク','31'],['イベント会社','イベント補助','10']
];
const jobCount=rnd(6,9);
state.jobs=[];
for(let i=0;i<jobCount;i++){
  const c=candidates[i];
  const start=i<5?pick(['2026-05-01','2026-05-10','2026-06-01']):pick(['2026-06-01','2026-06-05','2026-07-01']);
  const end=i===0?'2026-06-15':(i===jobCount-1?'2026-07-20':pick(['','','','2026-07-31']));
  state.jobs.push({name:c[0],content:c[1],startDate:start,endDate:end,closeDay:c[2]});
}
// limits.csvが読めない環境でも超過検証できるよう、サンプルでは全期間の上限を28時間に設定
for(let d=parseDate('2026-05-01');iso(d)<='2026-07-31';d=addDays(d,1))state.limits[iso(d)]=28;
// 現実的な留学生データ：基本は直近7日28時間以内。途中に少数の違反週を混ぜる。
const normalLimit=27.5*60;
const violationDays=new Set(['2026-06-16','2026-06-17']);
const dateList=[];for(let d=parseDate('2026-05-03');iso(d)<='2026-07-10';d=addDays(d,1))dateList.push(iso(d));
for(const ds of dateList){
  const active=activeForDate(ds);
  if(!active.length)continue;
  // 週4〜5日程度勤務。多くの日は1勤務、たまに2勤務。
  let workCount=0;
  if(violationDays.has(ds))workCount=2;
  else if(Math.random()<0.48)workCount=1;
  else if(Math.random()<0.09)workCount=2;
  if(workCount===0)continue;
  const jobs=[...active].sort(()=>Math.random()-0.5).slice(0,Math.min(workCount,active.length));
  const slots=[
    {start:9*60,dur:240,br:0},
    {start:14*60,dur:240,br:0},
    {start:17*60,dur:300,br:30},
    {start:18*60,dur:240,br:0},
    {start:22*60,dur:300,br:60} // 夜勤 22:00-03:00
  ].sort(()=>Math.random()-0.5);
  jobs.forEach((jobIndex,i)=>{
    const slot=slots[i%slots.length];
    const limit=violationDays.has(ds)?35*60:normalLimit;
    addWithinLimit(ds,jobIndex,slot.start,slot.dur,slot.br,limit);
  });
}
// 違反が必ず少し含まれるように、6/12〜6/17付近に重ならない追加勤務を入れる。
const forced=[
  ['2026-06-12',0,17*60,300,30],
  ['2026-06-13',1,9*60,360,60],
  ['2026-06-14',2,9*60,360,60],
  ['2026-06-15',3,17*60,300,30],
  ['2026-06-16',4,9*60,360,60],
  ['2026-06-17',5,17*60,300,30]
];
forced.forEach(([ds,ji,st,dur,br])=>{if(ji<state.jobs.length&&isJobActive(ji,ds))addSampleShift(ds,ji,st,dur,br)});
// 同一日の重なりがないか最終確認。重なったものは後から出た勤務を削除する。
Object.keys(state.days).forEach(ds=>{
  const kept=[];
  ensureDay(ds).works=ensureDay(ds).works.filter(w=>{
    if(w.status!=='work')return true;
    const [sh,sm]=w.start.split(':').map(Number),[eh,em]=w.end.split(':').map(Number);
    let a=sh*60+sm,b=eh*60+em;if(b<a)b+=1440;
    const cand={start:a,end:b};
    if(hasOverlap(kept,cand))return false;
    kept.push(cand);return true;
  });
});
save();render();alert('ランダムなサンプルデータを作成しました。基本は直近7日28時間以内で、少数の超過週を含みます。同じ時間帯の重複勤務は作らないようにしています。');
}

function updateWorkField(t,doNormalize=false){const ds=t.dataset.workDate,idx=Number(t.dataset.workIndex),field=t.dataset.workField;const day=ensureDay(ds);const w=day.works[idx];if(!w)return;if(field==='jobIndex'){if(t.value===''){w.jobIndex=null;w.status='blank';w.hours=null;}else if(t.value==='__none'){w.jobIndex=null;w.status='none';w.start='';w.end='';w.breakMin=0;w.hours=0;}else{w.jobIndex=Number(t.value)}}else if(field==='breakMin'){w.breakMin=Number(t.value)||0}else{let v=t.value;if(doNormalize&&(field==='start'||field==='end')){v=normalizeTimeText(v);t.value=v}w[field]=v}finalizeWork(w);state.lastDate=ds;save();renderDays()}
function normalizeTimeText(value){value=String(value||'').replace(/\D/g,'');if(value.length===0)return'';if(value.length<=2)return'00:'+value.padStart(2,'0');if(value.length===3)return'0'+value[0]+':'+value.slice(1);return value.slice(0,-2)+':'+value.slice(-2)}
function finalizeWork(w){if(w.status==='none'){w.jobIndex=null;w.start='';w.end='';w.breakMin=0;w.hours=0;return}const hasAny=w.jobIndex!==null&&w.jobIndex!==undefined||nonEmpty(w.start)||nonEmpty(w.end)||Number(w.breakMin||0)>0;if(!hasAny){w.status='blank';w.hours=null;return}if(w.jobIndex!==null&&w.jobIndex!==undefined&&nonEmpty(w.start)&&nonEmpty(w.end)){const h=calcHours(w.start,w.end,w.breakMin);if(h>16){alert('勤務時間が16時間を超えています。入力を確認してください。');w.status='blank';w.hours=null;return}if(h>12&&!w._warnedLong){if(!confirm('勤務時間が12時間を超えています。保存しますか？')){w.status='blank';w.hours=null;return}w._warnedLong=true}w.status='work';w.hours=h}else{w.status='blank';w.hours=null}}

async function checkLatestVersion(){
  try{
    const res=await fetch('./latest-version.json?ts='+Date.now(),{cache:'no-store'});
    if(!res.ok)return;
    const info=await res.json();
    const latest=String(info.latest||'').trim();
    if(!latest||latest===VERSION)return;

    const header=document.querySelector('header');
    if(header && !document.getElementById('latestVersionNotice')){
      const div=document.createElement('div');
      div.id='latestVersionNotice';
      div.className='notice';
      div.innerHTML=`最新版 ${latest} が公開されています。自動で再読込します。`;
      header.appendChild(div);
    }

    const currentUrl=new URL(location.href);
    const baseUrl=info.url||'./index.html';
    const nextUrl=new URL(baseUrl, location.href);
    nextUrl.searchParams.set('v', latest);
    nextUrl.searchParams.set('ts', String(Date.now()));

    const reloadKey='force-reload-to-'+latest;
    if(!sessionStorage.getItem(reloadKey)){
      sessionStorage.setItem(reloadKey,'1');
      setTimeout(()=>location.replace(nextUrl.toString()),500);
    }
  }catch(e){
    console.warn('latest version check failed',e);
  }
}
