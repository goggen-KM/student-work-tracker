<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>アルバイト時間記録</title>
<style>
:root{--bg:#f8f5ef;--card:#fffdfa;--ink:#2f2a25;--muted:#766b5f;--line:#e1d7c8;--accent:#e98a3a;--ok:#1f8a4c;--warn:#c98500;--bad:#c84032}
*{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;background:var(--bg);color:var(--ink);font-size:16px}.app{max-width:920px;margin:auto;padding:12px 12px 88px}header{position:sticky;top:0;z-index:5;background:linear-gradient(var(--bg) 88%,rgba(248,245,239,0));padding:10px 0 14px}h1{font-size:20px;margin:4px 0 8px}.bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.month{font-size:18px;font-weight:700;min-width:145px;text-align:center}.btn{border:0;border-radius:12px;background:var(--accent);color:white;font-weight:700;padding:11px 14px;font-size:15px}.btn.secondary{background:#6b6259}.btn.light{background:#eee4d6;color:var(--ink)}.btn.danger{background:var(--bad)}.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:12px;margin:10px 0;box-shadow:0 1px 2px rgba(0,0,0,.04)}label{display:block;font-size:13px;color:var(--muted);margin-bottom:4px}input,select{width:100%;padding:10px;border:1px solid var(--line);border-radius:10px;background:white;font-size:16px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}.jobHead{display:flex;gap:8px;align-items:end}.jobName{flex:1}.day{scroll-margin-top:95px}.dayTop{display:flex;justify-content:space-between;align-items:center;gap:10px}.dateTitle{font-size:18px;font-weight:800}.summary{font-weight:700}.ok{color:var(--ok)}.warn{color:var(--warn)}.bad{color:var(--bad)}.work{border-top:1px dashed var(--line);padding-top:10px;margin-top:10px}.workTitle{font-weight:700;margin-bottom:8px}.row{display:grid;grid-template-columns:82px 1fr 1fr;gap:8px;align-items:end}.small{font-size:12px;color:var(--muted)}.weekTools{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.footerNav{position:fixed;bottom:0;left:0;right:0;background:#fffdfa;border-top:1px solid var(--line);padding:8px;display:flex;gap:8px;justify-content:center;z-index:10}.footerNav .btn{flex:1;max-width:180px}.hidden{display:none}.notice{background:#fff3d8;border:1px solid #e2bf73;border-radius:12px;padding:10px;margin-top:10px}.locked{opacity:.72}.modal{position:fixed;inset:0;background:rgba(0,0,0,.35);display:none;align-items:flex-end;z-index:20}.panel{background:#fffdfa;border-radius:18px 18px 0 0;padding:16px;width:100%;max-height:88vh;overflow:auto}.table{width:100%;border-collapse:collapse;font-size:13px}.table th,.table td{border:1px solid #ccc;padding:4px;text-align:left}@media (min-width:720px){.modal{align-items:center}.panel{max-width:760px;margin:auto;border-radius:18px}.row{grid-template-columns:100px 1fr 1fr 110px}.app{padding-bottom:30px}.footerNav{position:sticky}.desktop4{display:block}}@media print{body{background:white}.app,header,.footerNav,.modal{display:none!important}#printArea{display:block!important;font-size:11px}.table th,.table td{padding:3px}}
</style>
</head>
<body>
<div class="app">
<header>
<h1>アルバイト時間記録</h1>
<div class="bar"><button class="btn light" id="prevMonth">＜</button><div class="month" id="monthLabel"></div><button class="btn light" id="nextMonth">＞</button><button class="btn secondary" id="todayBtn">今日</button></div>
</header>

<section class="card" id="studentCard">
<div class="small"><b>初回登録</b>：学生名・学籍番号・クラスは最初に1回だけ入力します。以後は自動保存されます。</div>
<div class="grid" style="margin-top:8px"><div><label>学生名</label><input id="studentName" placeholder="例：山田 太郎"></div><div><label>学籍番号</label><input id="studentId" placeholder="例：A001"></div></div>
<div class="grid" style="margin-top:10px"><div><label>クラス</label><input id="studentClass" placeholder="例：初級A"></div><div><label>基本上限（直近7日間）</label><input id="defaultLimit" type="number" step="0.5" value="28"></div></div>
</section>

<section class="card">
<div class="small">アルバイト情報（最大3件）</div>
<div id="jobSettings"></div>
</section>

<section class="card">
<div class="grid"><div><label>期間開始</label><input id="bulkStart" type="date"></div><div><label>期間終了</label><input id="bulkEnd" type="date"></div></div>
<div class="grid" style="margin-top:10px"><div><label>期間の上限</label><input id="bulkLimit" type="number" step="0.5" placeholder="例：40"></div><div style="display:flex;align-items:end"><button class="btn secondary" id="applyLimit">期間上限を設定</button></div></div>
<div class="weekTools"><button class="btn light" id="bulkNone">期間を全部なし</button><button class="btn light" id="copyPrevWeek">表示中の週を先週と同じにする</button></div>
</section>

<section class="card">
<div class="small">Googleスプレッドシート自動保存</div>
<div style="margin-top:8px"><label>Google Apps Script の WebアプリURL</label><input id="syncUrl" placeholder="https://script.google.com/macros/s/.../exec"></div>
<div class="grid" style="margin-top:10px"><div><label>自動送信</label><select id="autoSync"><option value="0">しない</option><option value="1">入力後に自動送信</option></select></div><div style="display:flex;align-items:end"><button class="btn secondary" id="syncBtn">今すぐ送信</button></div></div>
<div class="weekTools"><button class="btn light" id="snapshotBtn">表示月を履歴保存</button><button class="btn light" id="autoSnapshotBtn">前月分を月次保存</button></div>
<div class="small" id="syncStatus">未送信</div>
<div class="small" id="snapshotStatus">履歴保存：未実行</div>
<div class="small">履歴は軽量CSV形式で保存します（変更前の月次記録確認用）。</div>
</section>

<div id="days"></div>
</div>

<div class="footerNav"><button class="btn" id="exportBtn">出力</button><button class="btn secondary" id="saveBtn">保存</button></div>

<div class="modal" id="exportModal"><div class="panel"><h2>出力</h2>
<div class="grid"><div><label>開始日</label><input id="exportStart" type="date"></div><div><label>終了日</label><input id="exportEnd" type="date"></div></div>
<div class="weekTools"><button class="btn" id="csvBtn">CSVを作る</button><button class="btn secondary" id="pdfBtn">PDFを作る</button><button class="btn light" id="closeExport">閉じる</button></div>
<p class="small">PDFはブラウザの印刷画面から「PDFとして保存」を選んでください。</p>
</div></div>
<div id="printArea" class="hidden"></div>

<script>
const KEY='arbeit-tracker-v3';
const jpWeek=['日','月','火','水','木','金','土'];
let state=load()||{student:{name:'',id:'',className:''},defaultLimit:28,jobs:[{name:'',wage:''},{name:'',wage:''},{name:'',wage:''}],days:{},limits:{},sync:{url:'',auto:false,lastSynced:'',lastSnapshotMonth:''},currentMonth:ym(new Date()),lastDate:iso(new Date())};
if(!state.sync)state.sync={url:'',auto:false,lastSynced:'',lastSnapshotMonth:''};
if(!('lastSnapshotMonth' in state.sync))state.sync.lastSnapshotMonth='';
function iso(d){return d.toISOString().slice(0,10)} function ym(d){return iso(new Date(d.getFullYear(),d.getMonth(),1)).slice(0,7)}
function parse(s){const [y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d)} function addDays(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return x}
function monthDates(ymstr){const [y,m]=ymstr.split('-').map(Number), a=[];let d=new Date(y,m-1,1);while(d.getMonth()==m-1){a.push(iso(d));d.setDate(d.getDate()+1)}return a}
function ensureDay(ds){if(!state.days[ds])state.days[ds]={works:[{on:false,start:'',end:''},{on:false,start:'',end:''},{on:false,start:'',end:''}]};return state.days[ds]}
function load(){try{return JSON.parse(localStorage.getItem(KEY))}catch(e){return null}} function save(){localStorage.setItem(KEY,JSON.stringify(state))}
function hours(start,end){if(!start||!end)return 0;let [sh,sm]=start.split(':').map(Number),[eh,em]=end.split(':').map(Number);let a=sh*60+sm,b=eh*60+em;if(b<a)b+=24*60;return Math.max(0,(b-a)/60)}
function dayHours(ds){const d=ensureDay(ds);return d.works.reduce((s,w)=>s+(w.on?hours(w.start,w.end):0),0)}
function sevenHours(ds){let d=parse(ds),sum=0;for(let i=6;i>=0;i--)sum+=dayHours(iso(addDays(d,-i)));return sum}
function limit(ds){return Number(state.limits[ds]??state.defaultLimit??28)}
function statusClass(sum,lim){if(sum>lim)return 'bad'; if(sum>=lim*.9)return 'warn'; return 'ok'}
function render(){document.getElementById('monthLabel').textContent=state.currentMonth.replace('-','年')+'月';document.getElementById('studentName').value=state.student.name;document.getElementById('studentId').value=state.student.id;document.getElementById('studentClass').value=state.student.className;document.getElementById('defaultLimit').value=state.defaultLimit;document.getElementById('syncUrl').value=state.sync.url||'';document.getElementById('autoSync').value=state.sync.auto?'1':'0';document.getElementById('syncStatus').textContent=state.sync.lastSynced?'最終送信：'+state.sync.lastSynced:'未送信';document.getElementById('snapshotStatus').textContent=state.sync.lastSnapshotMonth?'履歴保存：'+state.sync.lastSnapshotMonth+' まで保存済み':'履歴保存：未実行';renderJobs();renderDays();setTimeout(()=>{const target=document.getElementById('day-'+(state.lastDate||iso(new Date()))); if(target)target.scrollIntoView({block:'start'});},100)}
function renderJobs(){const el=document.getElementById('jobSettings');el.innerHTML='';state.jobs.forEach((j,i)=>{const div=document.createElement('div');div.className='jobHead';div.style.marginTop='8px';div.innerHTML=`<div class="small">${i+1}</div><div class="jobName"><label>アルバイト名</label><input data-job-name="${i}" value="${esc(j.name)}" placeholder="例：コンビニ"></div><div style="width:110px"><label>時給</label><input data-job-wage="${i}" type="number" value="${esc(j.wage)}" placeholder="1100"></div>`;el.appendChild(div)})}
function renderDays(){const box=document.getElementById('days');box.innerHTML='';monthDates(state.currentMonth).forEach((ds,idx)=>{const d=parse(ds), data=ensureDay(ds), sum7=sevenHours(ds), lim=limit(ds), cls=statusClass(sum7,lim);const card=document.createElement('section');card.className='card day';card.id='day-'+ds;let html=`<div class="dayTop"><div><div class="dateTitle">${d.getMonth()+1}月${d.getDate()}日（${jpWeek[d.getDay()]}）</div><div class="small">直近7日間：<b class="${cls}">${sum7.toFixed(1)}時間 / 上限${lim}時間</b></div></div><div class="summary">今日 ${dayHours(ds).toFixed(1)}h</div></div>`;
html+=`<div class="grid" style="margin-top:10px"><div><label>この日の上限</label><input type="number" step="0.5" data-limit="${ds}" value="${lim}"></div><div style="display:flex;align-items:end"><button class="btn light" data-week-none="${ds}">この週 全部なし</button></div></div>`;
for(let i=0;i<3;i++){const w=data.works[i];html+=`<div class="work"><div class="workTitle">${i+1}. ${esc(state.jobs[i].name)||'アルバイト'+(i+1)}</div><div class="row"><div><label>有無</label><select data-on="${ds},${i}"><option value="0" ${!w.on?'selected':''}>なし</option><option value="1" ${w.on?'selected':''}>あり</option></select></div><div><label>開始</label><input type="time" data-start="${ds},${i}" value="${w.start||''}"></div><div><label>終了</label><input type="time" data-end="${ds},${i}" value="${w.end||''}"></div></div><div class="small">勤務時間：${w.on?hours(w.start,w.end).toFixed(1):'0.0'}時間　給与見込み：${Math.round((w.on?hours(w.start,w.end):0)*(Number(state.jobs[i].wage)||0)).toLocaleString()}円</div></div>`}
card.innerHTML=html;box.appendChild(card)})}
function esc(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}

let syncTimer=null;
function maybeAutoSync(){if(!state.sync?.auto||!state.sync.url)return;clearTimeout(syncTimer);syncTimer=setTimeout(()=>syncToSheet(false),1800)}
function monthRange(){const dates=monthDates(state.currentMonth);return [dates[0],dates[dates.length-1]]}
function csvEscape(v){v=(v==null?'':String(v));return /[",
]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v}
function compactSnapshotCsv(a,b){
  const header=['date','j1','j2','j3','dayHours','sevenDayHours','limit','over'];
  const lines=[header.join(',')];
  for(let d=parse(a);iso(d)<=b;d=addDays(d,1)){
    const ds=iso(d), day=ensureDay(ds);
    const jobs=[0,1,2].map(i=>{const w=day.works[i]||{};return w.on?`${w.start||''}-${w.end||''}:${hours(w).toFixed(2)}`:'0'});
    const total=dayHours(ds).toFixed(2), s7=sum7(ds).toFixed(2), lim=limitOf(ds), over=(Number(s7)>lim?'1':'0');
    lines.push([ds,...jobs,total,s7,lim,over].map(csvEscape).join(','));
  }
  return lines.join('\n');
}
function syncPayload(a,b,action='sync'){return {app:'arbeit-tracker',version:4,action:action,snapshotId:(action==='snapshot'?((state.student.id||'noid')+'_'+a+'_'+b+'_'+new Date().toISOString()):''),snapshotCsv:(action==='snapshot'?compactSnapshotCsv(a,b):''),sentAt:new Date().toISOString(),student:state.student,jobs:state.jobs,defaultLimit:state.defaultLimit,period:{start:a,end:b},rows:rows(a,b).map(r=>({studentId:state.student.id,studentName:state.student.name,className:state.student.className,date:r.date,week:r.week,jobNo:r.no,jobName:r.name,status:r.on,start:r.start,end:r.end,hours:Number(r.h.toFixed(2)),wage:r.wage,pay:r.pay,sevenDayHours:Number(r.sum7.toFixed(2)),limit:r.limit,over:r.sum7>r.limit?'超過':'OK'}))}}
async function syncToSheet(showAlert=true){updateFromInputs();save();if(!state.sync.url){alert('Google Apps Script のURLを入力してください');return}if(!state.student.id){alert('学籍番号を入力してください');return}const [a,b]=monthRange();const status=document.getElementById('syncStatus');status.textContent='送信中...';try{await fetch(state.sync.url,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(syncPayload(a,b,'sync'))});state.sync.lastSynced=new Date().toLocaleString('ja-JP');save();status.textContent='最終送信：'+state.sync.lastSynced;if(showAlert)alert('Googleスプレッドシートへ送信しました。');}catch(err){status.textContent='送信失敗：'+err.message;if(showAlert)alert('送信に失敗しました：'+err.message)}}


async function sendSnapshot(a,b,showAlert=true){
  updateFromInputs();save();
  if(!state.sync.url){alert('Google Apps Script のURLを入力してください');return}
  if(!state.student.id){alert('学籍番号を入力してください');return}
  const status=document.getElementById('snapshotStatus');status.textContent='履歴保存中...';
  try{
    await fetch(state.sync.url,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(syncPayload(a,b,'snapshot'))});
    state.sync.lastSnapshotMonth=a.slice(0,7);
    save();
    status.textContent='履歴保存：'+a+'〜'+b+' を保存しました';
    if(showAlert)alert('履歴スナップショットを保存しました。');
  }catch(err){
    status.textContent='履歴保存失敗：'+err.message;
    if(showAlert)alert('履歴保存に失敗しました：'+err.message)
  }
}
function prevMonthRange(){const now=new Date();const d=new Date(now.getFullYear(),now.getMonth()-1,1);const m=ym(d);const dates=monthDates(m);return [dates[0],dates[dates.length-1]]}
function displayedMonthRange(){const dates=monthDates(state.currentMonth);return [dates[0],dates[dates.length-1]]}
function autoMonthlySnapshot(){
  if(!state.sync?.url || !state.student?.id)return;
  const [a,b]=prevMonthRange();
  const m=a.slice(0,7);
  if(state.sync.lastSnapshotMonth!==m){sendSnapshot(a,b,false)}
}

function updateFromInputs(){state.student.name=document.getElementById('studentName').value;state.student.id=document.getElementById('studentId').value;state.student.className=document.getElementById('studentClass').value;state.defaultLimit=Number(document.getElementById('defaultLimit').value)||28;state.sync.url=document.getElementById('syncUrl')?.value.trim()||'';state.sync.auto=document.getElementById('autoSync')?.value==='1';document.querySelectorAll('[data-job-name]').forEach(x=>state.jobs[x.dataset.jobName].name=x.value);document.querySelectorAll('[data-job-wage]').forEach(x=>state.jobs[x.dataset.jobWage].wage=x.value)}
document.addEventListener('change',e=>{const t=e.target;updateFromInputs(); if(t.dataset.on){const [ds,i]=t.dataset.on.split(',');ensureDay(ds).works[i].on=t.value==='1';state.lastDate=ds} if(t.dataset.start){const [ds,i]=t.dataset.start.split(',');ensureDay(ds).works[i].start=t.value;ensureDay(ds).works[i].on=true;state.lastDate=ds} if(t.dataset.end){const [ds,i]=t.dataset.end.split(',');ensureDay(ds).works[i].end=t.value;ensureDay(ds).works[i].on=true;state.lastDate=ds} if(t.dataset.limit){state.limits[t.dataset.limit]=Number(t.value)||state.defaultLimit;state.lastDate=t.dataset.limit} save(); renderDays(); maybeAutoSync();});
document.addEventListener('click',e=>{const t=e.target;if(t.dataset.weekNone){weekNone(t.dataset.weekNone);save();renderDays();maybeAutoSync()}});
document.getElementById('prevMonth').onclick=()=>{const [y,m]=state.currentMonth.split('-').map(Number);state.currentMonth=ym(new Date(y,m-2,1));save();render()};
document.getElementById('nextMonth').onclick=()=>{const [y,m]=state.currentMonth.split('-').map(Number);state.currentMonth=ym(new Date(y,m,1));save();render()};
document.getElementById('todayBtn').onclick=()=>{state.currentMonth=ym(new Date());state.lastDate=iso(new Date());save();render()};
document.getElementById('saveBtn').onclick=()=>{updateFromInputs();save();alert('保存しました')};
document.getElementById('syncBtn').onclick=()=>syncToSheet(true);
document.getElementById('snapshotBtn').onclick=()=>{const [a,b]=displayedMonthRange();sendSnapshot(a,b,true)};
document.getElementById('autoSnapshotBtn').onclick=()=>{const [a,b]=prevMonthRange();sendSnapshot(a,b,true)};
document.getElementById('syncUrl').addEventListener('change',()=>{updateFromInputs();save()});
document.getElementById('autoSync').addEventListener('change',()=>{updateFromInputs();save()});
function weekRange(ds){let d=parse(ds);let start=addDays(d,-((d.getDay()+6)%7));return [iso(start),iso(addDays(start,6))]}
function setNone(ds){const d=ensureDay(ds);d.works.forEach(w=>{w.on=false;w.start='';w.end=''})}
function weekNone(ds){const [a,b]=weekRange(ds);for(let d=parse(a);iso(d)<=b;d=addDays(d,1))setNone(iso(d))}
document.getElementById('bulkNone').onclick=()=>{const a=document.getElementById('bulkStart').value,b=document.getElementById('bulkEnd').value;if(!a||!b)return alert('期間を選んでください');for(let d=parse(a);iso(d)<=b;d=addDays(d,1))setNone(iso(d));save();renderDays();maybeAutoSync()}
document.getElementById('applyLimit').onclick=()=>{const a=document.getElementById('bulkStart').value,b=document.getElementById('bulkEnd').value,v=Number(document.getElementById('bulkLimit').value);if(!a||!b||!v)return alert('期間と上限を入力してください');for(let d=parse(a);iso(d)<=b;d=addDays(d,1))state.limits[iso(d)]=v;save();renderDays();maybeAutoSync()}
document.getElementById('copyPrevWeek').onclick=()=>{const base=state.lastDate||iso(new Date()),[a,b]=weekRange(base);for(let d=parse(a);iso(d)<=b;d=addDays(d,1)){const target=iso(d),src=iso(addDays(d,-7));state.days[target]=JSON.parse(JSON.stringify(ensureDay(src)))}save();renderDays();maybeAutoSync()}
document.getElementById('exportBtn').onclick=()=>{const dates=monthDates(state.currentMonth);document.getElementById('exportStart').value=dates[0];document.getElementById('exportEnd').value=dates[dates.length-1];document.getElementById('exportModal').style.display='flex'};
document.getElementById('closeExport').onclick=()=>document.getElementById('exportModal').style.display='none';
function rows(a,b){let out=[];for(let d=parse(a);iso(d)<=b;d=addDays(d,1)){const ds=iso(d);for(let i=0;i<3;i++){const w=ensureDay(ds).works[i],h=w.on?hours(w.start,w.end):0;out.push({date:ds,week:jpWeek[d.getDay()],no:i+1,name:state.jobs[i].name,on:w.on?'あり':'なし',start:w.start,end:w.end,h:h,wage:state.jobs[i].wage||'',pay:Math.round(h*(Number(state.jobs[i].wage)||0)),sum7:sevenHours(ds),limit:limit(ds)})}}return out}
document.getElementById('csvBtn').onclick=()=>{const a=exportStart.value,b=exportEnd.value;if(!a||!b)return;let csv='日付,曜日,番号,アルバイト名,ありなし,開始,終了,労働時間,時給,給与見込み,直近7日間合計,上限\n';rows(a,b).forEach(r=>csv+=[r.date,r.week,r.no,q(r.name),r.on,r.start,r.end,r.h.toFixed(1),r.wage,r.pay,r.sum7.toFixed(1),r.limit].join(',')+'\n');download(csv,'arbeit_'+a+'_'+b+'.csv','text/csv')};
function q(s){return '"'+String(s??'').replace(/"/g,'""')+'"'} function download(data,name,type){const blob=new Blob([data],{type:type+';charset=utf-8'}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download=name;a.click();URL.revokeObjectURL(url)}
document.getElementById('pdfBtn').onclick=()=>{const a=exportStart.value,b=exportEnd.value;if(!a||!b)return;let html=`<h2>アルバイト時間記録 ${a}〜${b}</h2><p>氏名：${esc(state.student.name)}　学籍番号：${esc(state.student.id)}　クラス：${esc(state.student.className)}</p><table class="table"><thead><tr><th>日付</th><th>曜</th><th>番号</th><th>アルバイト名</th><th>有無</th><th>開始</th><th>終了</th><th>時間</th><th>7日間</th><th>上限</th></tr></thead><tbody>`;rows(a,b).forEach(r=>{html+=`<tr><td>${r.date}</td><td>${r.week}</td><td>${r.no}</td><td>${esc(r.name)}</td><td>${r.on}</td><td>${r.start}</td><td>${r.end}</td><td>${r.h.toFixed(1)}</td><td>${r.sum7.toFixed(1)}</td><td>${r.limit}</td></tr>`});html+='</tbody></table>';const p=document.getElementById('printArea');p.innerHTML=html;p.className='';window.print();p.className='hidden'};
